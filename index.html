<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Lương Tổ Đội — PTSG</title>
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f2f8;
    --text2: #8b92a8;
    --text3: #5a6075;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* Header */
  .header { margin-bottom: 24px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .header-sub { font-size: 12px; color: var(--text2); }

  /* Filters */
  .filters {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
    margin-bottom: 20px;
  }
  .fg label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .fg input, .fg select {
    width: 100%; height: 38px; padding: 0 12px;
    background: var(--bg3); border: 0.5px solid var(--border2);
    border-radius: 8px; color: var(--text); font-size: 13px;
    outline: none; transition: border-color 0.15s;
  }
  .fg input:focus, .fg select:focus { border-color: var(--green); }
  .fg select option { background: var(--bg3); }
  .btn {
    height: 38px; padding: 0 24px;
    background: var(--green); color: #fff;
    border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--green-dark); }
  .btn:active { transform: scale(0.98); }

  /* Status */
  .status {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .metric {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .metric-value { font-size: 26px; font-weight: 600; line-height: 1; }
  .metric-value.green { color: var(--green); }
  .metric-value.blue { color: #60a5fa; }
  .metric-value.white { color: var(--text); }

  /* Table */
  .table-container {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-header {
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
    color: var(--text2);
    display: flex; align-items: center; gap: 8px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 11px 20px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--bg3);
    border-bottom: 0.5px solid var(--border);
  }
  thead th.right { text-align: right; }
  tbody tr { border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 12px 20px; font-size: 13px; color: var(--text); }
  tbody td.right { text-align: right; }
  tbody td.muted { color: var(--text2); }
  .amount { color: var(--green); font-weight: 600; font-variant-numeric: tabular-nums; }
  tfoot tr { border-top: 1px solid var(--border2); background: var(--bg3); }
  tfoot td { padding: 13px 20px; font-size: 13px; font-weight: 600; color: var(--text); }
  tfoot td.right { text-align: right; }

  /* Badge */
  .badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .b-green { background: var(--green-light); color: var(--green-dark); }
  .b-blue { background: var(--blue-light); color: var(--blue); }
  .b-amber { background: var(--amber-light); color: var(--amber); }
  .b-coral { background: var(--coral-light); color: var(--coral); }
  .b-purple { background: var(--purple-light); color: var(--purple); }

  /* States */
  .state-msg { padding: 48px 20px; text-align: center; color: var(--text2); font-size: 13px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: #f87171; }

  @media (max-width: 768px) {
    .filters { grid-template-columns: 1fr 1fr; }
    .filters .btn { grid-column: 1 / -1; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1><span>🏗️</span> Dashboard Lương Tổ Đội — PTSG</h1>
      <div class="live-dot" title="Real-time"></div>
    </div>
    <div class="header-sub" id="update-time">Đang kết nối Lark Base...</div>
  </div>

  <div class="filters">
    <div class="fg">
      <label>Từ ngày</label>
      <input type="date" id="date-from"/>
    </div>
    <div class="fg">
      <label>Đến ngày</label>
      <input type="date" id="date-to"/>
    </div>
    <div class="fg">
      <label>Tổ đội</label>
      <select id="sel-to-doi"><option value="">Tất cả</option></select>
    </div>
    <div class="fg">
      <label>Công trình</label>
      <select id="sel-cong-trinh"><option value="">Tất cả</option></select>
    </div>
    <button class="btn" onclick="applyFilter()">Tính lương</button>
  </div>

  <div class="status" id="status-bar">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Đang tải dữ liệu từ Lark Base...</span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Tổng lương kỳ</div>
      <div class="metric-value green" id="m-total">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Số tổ đội</div>
      <div class="metric-value blue" id="m-to-doi">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Tổng ngày công</div>
      <div class="metric-value white" id="m-ngay-cong">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">TB/Tổ đội</div>
      <div class="metric-value green" id="m-tb">—</div>
    </div>
  </div>

  <div class="table-container">
    <div class="table-header">
      <span>Chi tiết theo tổ đội · công trình</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Tổ đội</th>
          <th>Công trình</th>
          <th class="right">Ngày công</th>
          <th class="right">Tổng lương</th>
          <th class="right hide-mobile">TB/Ngày</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="state-msg"><div class="spinner"></div><br/>Đang tải dữ liệu...</td></tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="2"><strong>TỔNG CỘNG</strong></td>
          <td class="right" id="f-ngay">—</td>
          <td class="right amount" id="f-luong">—</td>
          <td class="hide-mobile"></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
// ============================================================
// CẤU HÌNH — Thay đổi nếu cần
// ============================================================
const CONFIG = {
  APP_ID:     'cli_a9623263ca399eea',
  APP_SECRET: 'n9YxZzhj38BBX2yqz6ia7mzXdZDB7oVF',
  BASE_ID:    'Gg5TbludRa8oHcswRpNls8C9gZd',
  TABLE_ID:   'tbl1SH0zppLyePdB',
  // Tên cột trong Lark Base (khớp chính xác)
  FIELDS: {
    TO_DOI:      'Tổ Đội',
    CONG_TRINH:  'Công trình',
    NGAY_THI_CONG: 'Ngày Thi Công',
    TONG_NHAN_SU: 'Tổng Nhân Sự',
    TONG_LUONG:  'Tổng Lương/ Ngày',
  }
};

// ============================================================
let allRecords = [];
const BADGE_CLASSES = ['b-green','b-blue','b-amber','b-coral','b-purple'];
const badgeMap = {};
let badgeIdx = 0;

function getBadge(name) {
  if (!badgeMap[name]) badgeMap[name] = BADGE_CLASSES[badgeIdx++ % BADGE_CLASSES.length];
  return badgeMap[name];
}

function fmt(n) {
  return '₫' + Math.round(n).toLocaleString('vi-VN');
}

function parseAmt(val) {
  if (!val && val !== 0) return 0;
  if (typeof val === 'number') return val;
  return parseFloat(String(val).replace(/[₫,\s]/g,'')) || 0;
}

function parseDate(val) {
  if (!val) return null;
  if (typeof val === 'number') return new Date(val);
  const s = String(val).trim().replace(/\//g,'-');
  return new Date(s);
}

function toISO(d) {
  if (!d || isNaN(d)) return '';
  return d.toISOString().slice(0,10);
}

function setStatus(msg, loading=false, error=false) {
  document.getElementById('spinner').style.display = loading ? 'inline-block' : 'none';
  const el = document.getElementById('status-text');
  el.textContent = msg;
  el.className = error ? 'error-msg' : '';
}

// Lấy tenant token
async function getToken() {
  const res = await fetch('https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ app_id: CONFIG.APP_ID, app_secret: CONFIG.APP_SECRET })
  });
  const data = await res.json();
  if (!data.tenant_access_token) throw new Error('Không lấy được token: ' + JSON.stringify(data));
  return data.tenant_access_token;
}

// Lấy toàn bộ records (phân trang)
async function fetchAll(token) {
  const records = [];
  let pageToken = null;
  do {
    const url = new URL(`https://open.larksuite.com/open-apis/bitable/v1/apps/${CONFIG.BASE_ID}/tables/${CONFIG.TABLE_ID}/records`);
    url.searchParams.set('page_size', '500');
    if (pageToken) url.searchParams.set('page_token', pageToken);
    const res = await fetch(url.toString(), {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.code !== 0) throw new Error('Lark API lỗi: ' + (data.msg || data.code));
    const items = data.data?.items || [];
    records.push(...items);
    pageToken = data.data?.has_more ? data.data.page_token : null;
  } while (pageToken);
  return records;
}

// Parse record từ Lark fields
function parseRecord(item) {
  const f = item.fields || {};
  const F = CONFIG.FIELDS;

  const getVal = (...keys) => {
    for (const k of keys) {
      const v = f[k];
      if (v !== undefined && v !== null && v !== '') return v;
    }
    return '';
  };

  // Tên tổ đội — có thể là array (lookup) hoặc string
  let toDoi = getVal(F.TO_DOI);
  if (Array.isArray(toDoi)) toDoi = toDoi.map(x => (typeof x === 'object' ? (x.text || x.name || '') : x)).join(', ');

  let congTrinh = getVal(F.CONG_TRINH, 'Công trình (fill)');
  if (Array.isArray(congTrinh)) congTrinh = congTrinh.map(x => (typeof x === 'object' ? (x.text || x.name || '') : x)).join(', ');

  const ngayCong = parseFloat(getVal(F.TONG_NHAN_SU)) || 0;
  const luong = parseAmt(getVal(F.TONG_LUONG));
  const date = parseDate(getVal(F.NGAY_THI_CONG, 'Ngày điền form'));

  return {
    toDoi: toDoi || '—',
    congTrinh: congTrinh || '—',
    ngayCong,
    luong,
    date,
    dateStr: toISO(date)
  };
}

async function loadData() {
  setStatus('Đang xác thực với Lark...', true);
  try {
    const token = await getToken();
    setStatus('Đang tải bản ghi...', true);
    const items = await fetchAll(token);

    allRecords = items.map(parseRecord).filter(r => r.luong > 0 || r.ngayCong > 0);

    // Cập nhật thời gian
    const now = new Date();
    document.getElementById('update-time').textContent =
      `Dữ liệu cập nhật lúc: ${now.toLocaleDateString('vi-VN')} ${now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})} · Tổng ${items.length} bản ghi`;

    // Populate filter dropdowns
    populateSelects();

    // Set default dates = toàn bộ dữ liệu
    const dates = allRecords.map(r => r.dateStr).filter(Boolean).sort();
    if (dates.length) {
      document.getElementById('date-from').value = dates[0];
      document.getElementById('date-to').value = dates[dates.length - 1];
    }

    applyFilter();
  } catch(e) {
    console.error(e);
    setStatus('Lỗi: ' + e.message, false, true);
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="5" class="state-msg error-msg">❌ ${e.message}<br/><br/>Kiểm tra App ID, Secret và quyền truy cập Base.</td></tr>`;
  }
}

function populateSelects() {
  const toDois = [...new Set(allRecords.map(r => r.toDoi))].sort();
  const congTrinhs = [...new Set(allRecords.map(r => r.congTrinh))].sort();

  const selTD = document.getElementById('sel-to-doi');
  const selCT = document.getElementById('sel-cong-trinh');

  toDois.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    selTD.appendChild(o);
  });
  congTrinhs.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    selCT.appendChild(o);
  });
}

function applyFilter() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  const toDoi = document.getElementById('sel-to-doi').value;
  const congTrinh = document.getElementById('sel-cong-trinh').value;

  const filtered = allRecords.filter(r => {
    if (from && r.dateStr && r.dateStr < from) return false;
    if (to   && r.dateStr && r.dateStr > to)   return false;
    if (toDoi && r.toDoi !== toDoi) return false;
    if (congTrinh && r.congTrinh !== congTrinh) return false;
    return true;
  });

  // Group by toDoi + congTrinh
  const map = {};
  filtered.forEach(r => {
    const key = r.toDoi + '||' + r.congTrinh;
    if (!map[key]) map[key] = { toDoi: r.toDoi, congTrinh: r.congTrinh, ngayCong: 0, luong: 0 };
    map[key].ngayCong += r.ngayCong;
    map[key].luong    += r.luong;
  });
  const rows = Object.values(map).sort((a,b) => b.luong - a.luong);

  // Totals
  const totalLuong  = rows.reduce((s,r) => s + r.luong, 0);
  const totalNgay   = filtered.reduce((s,r) => s + r.ngayCong, 0);
  const uniqueToDoi = new Set(rows.map(r => r.toDoi)).size;
  const tb          = uniqueToDoi ? totalLuong / uniqueToDoi : 0;

  document.getElementById('m-total').textContent    = fmt(totalLuong);
  document.getElementById('m-to-doi').textContent   = uniqueToDoi;
  document.getElementById('m-ngay-cong').textContent = Math.round(totalNgay) + ' ngày';
  document.getElementById('m-tb').textContent       = fmt(tb);

  // Status bar
  const fromLabel = from ? new Date(from).toLocaleDateString('vi-VN') : '—';
  const toLabel   = to   ? new Date(to).toLocaleDateString('vi-VN')   : '—';
  setStatus(`Kỳ tính lương: ${fromLabel} → ${toLabel} · ${filtered.length} bản ghi · ${rows.length} dòng`);

  // Table
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="state-msg">Không có dữ liệu trong khoảng thời gian này</td></tr>';
  } else {
    tbody.innerHTML = rows.map(r => {
      const tbngay = r.ngayCong > 0 ? r.luong / r.ngayCong : 0;
      return `<tr>
        <td><span class="badge ${getBadge(r.toDoi)}">${r.toDoi}</span></td>
        <td class="muted">${r.congTrinh}</td>
        <td class="right">${Math.round(r.ngayCong)} ngày</td>
        <td class="right amount">${fmt(r.luong)}</td>
        <td class="right muted hide-mobile">${fmt(tbngay)}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('f-ngay').textContent  = Math.round(totalNgay) + ' ngày';
  document.getElementById('f-luong').textContent = fmt(totalLuong);
}

// Khởi động
loadData();
</script>
</body>
</html>
