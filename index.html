<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Lương Tổ Đội — PTSG</title>
<style>
  :root {
    --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE;
    --blue: #185FA5; --blue-light: #E6F1FB;
    --amber: #854F0B; --amber-light: #FAEEDA;
    --coral: #993C1D; --coral-light: #FAECE7;
    --purple: #534AB7; --purple-light: #EEEDFE;
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f2f8; --text2: #8b92a8; --text3: #5a6075;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; }
  .app { max-width:1200px; margin:0 auto; padding:24px 20px; }
  .header { margin-bottom:24px; }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .header h1 { font-size:20px; font-weight:600; display:flex; align-items:center; gap:10px; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .header-sub { font-size:12px; color:var(--text2); }
  .filters { background:var(--bg2); border:.5px solid var(--border); border-radius:12px; padding:16px; display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto; gap:12px; align-items:end; margin-bottom:20px; }
  .fg label { font-size:11px; color:var(--text2); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
  .fg input,.fg select { width:100%; height:38px; padding:0 12px; background:var(--bg3); border:.5px solid var(--border2); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
  .fg input:focus,.fg select:focus { border-color:var(--green); }
  .fg select option { background:var(--bg3); }
  .btn { height:38px; padding:0 24px; background:var(--green); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn:hover { background:var(--green-dark); }
  .status { background:var(--bg2); border:.5px solid var(--border); border-left:3px solid var(--green); border-radius:8px; padding:10px 16px; font-size:12px; color:var(--text2); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .status.error { border-left-color:#f87171; }
  .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .metric { background:var(--bg2); border:.5px solid var(--border); border-radius:12px; padding:18px 20px; }
  .metric-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; }
  .metric-value { font-size:26px; font-weight:600; line-height:1; }
  .metric-value.green { color:var(--green); }
  .metric-value.blue { color:#60a5fa; }
  .table-container { background:var(--bg2); border:.5px solid var(--border); border-radius:12px; overflow:hidden; }
  .table-header { padding:14px 20px; border-bottom:.5px solid var(--border); font-size:13px; color:var(--text2); }
  table { width:100%; border-collapse:collapse; }
  thead th { padding:11px 20px; text-align:left; font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; background:var(--bg3); border-bottom:.5px solid var(--border); }
  thead th.r { text-align:right; }
  tbody tr { border-bottom:.5px solid var(--border); transition:background .1s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--bg3); }
  tbody td { padding:12px 20px; font-size:13px; }
  tbody td.r { text-align:right; }
  tbody td.m { color:var(--text2); }
  .amount { color:var(--green); font-weight:600; }
  tfoot tr { border-top:1px solid var(--border2); background:var(--bg3); }
  tfoot td { padding:13px 20px; font-size:13px; font-weight:600; }
  tfoot td.r { text-align:right; }
  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .b-green{background:var(--green-light);color:var(--green-dark);}
  .b-blue{background:var(--blue-light);color:var(--blue);}
  .b-amber{background:var(--amber-light);color:var(--amber);}
  .b-coral{background:var(--coral-light);color:var(--coral);}
  .b-purple{background:var(--purple-light);color:var(--purple);}
  .state-msg { padding:48px 20px; text-align:center; color:var(--text2); font-size:13px; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border2); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .err { color:#f87171; }
  @media(max-width:768px){
    .filters{grid-template-columns:1fr 1fr;}
    .filters .btn{grid-column:1/-1;}
    .metrics{grid-template-columns:repeat(2,1fr);}
    .hm{display:none;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>🏗️ Dashboard Lương Tổ Đội — PTSG</h1>
      <div class="live-dot"></div>
    </div>
    <div class="header-sub" id="uptime">Đang kết nối Lark Base...</div>
  </div>

  <div class="filters">
    <div class="fg"><label>Từ ngày</label><input type="date" id="df"/></div>
    <div class="fg"><label>Đến ngày</label><input type="date" id="dt"/></div>
    <div class="fg"><label>Tổ đội</label><select id="std"><option value="">Tất cả</option></select></div>
    <div class="fg"><label>Công trình</label><select id="sct"><option value="">Tất cả</option></select></div>
    <button class="btn" onclick="filter()">Tính lương</button>
  </div>

  <div class="status" id="sb">
    <div class="spinner" id="sp"></div>
    <span id="st">Đang tải dữ liệu từ Lark Base...</span>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Tổng lương kỳ</div><div class="metric-value green" id="mt">—</div></div>
    <div class="metric"><div class="metric-label">Số tổ đội</div><div class="metric-value blue" id="md">—</div></div>
    <div class="metric"><div class="metric-label">Tổng ngày công</div><div class="metric-value" id="mn">—</div></div>
    <div class="metric"><div class="metric-label">TB/Tổ đội</div><div class="metric-value green" id="mb">—</div></div>
  </div>

  <div class="table-container">
    <div class="table-header">Chi tiết theo tổ đội · công trình</div>
    <table>
      <thead><tr>
        <th>Tổ đội</th><th>Công trình</th>
        <th class="r">Ngày công</th><th class="r">Tổng lương</th>
        <th class="r hm">TB/Ngày</th>
      </tr></thead>
      <tbody id="tb"><tr><td colspan="5" class="state-msg"><div class="spinner"></div><br/><br/>Đang tải...</td></tr></tbody>
      <tfoot><tr>
        <td colspan="2"><strong>TỔNG CỘNG</strong></td>
        <td class="r" id="fn">—</td>
        <td class="r amount" id="fl">—</td>
        <td class="hm"></td>
      </tr></tfoot>
    </table>
  </div>
</div>

<script>
const PROXY  = 'https://wandering-resonance-d2f6.thucit.workers.dev';
const APP_ID = 'cli_a9623263ca399eea';
const APP_SC = 'n9YxZzhj38BBX2yqz6ia7mzXdZDB7oVF';
const BASE   = 'Gg5TbludRa8oHcswRpNls8C9gZd';
const TABLE  = 'tbl1SH0zppLyePdB';

let recs=[], BDGS=['b-green','b-blue','b-amber','b-coral','b-purple'], bmap={}, bi=0;
const bg=n=>{if(!bmap[n])bmap[n]=BDGS[bi++%BDGS.length];return bmap[n];};
const fmt=n=>'₫'+Math.round(n).toLocaleString('vi-VN');
const amt=v=>{if(!v&&v!==0)return 0;if(typeof v==='number')return v;return parseFloat(String(v).replace(/[₫,\s]/g,''))||0;};
const pd=v=>{if(!v)return null;if(typeof v==='number')return new Date(v);return new Date(String(v).trim().replace(/\//g,'-'));};
const iso=d=>{if(!d||isNaN(d))return'';return d.toISOString().slice(0,10);};

function ss(msg,load=false,err=false){
  document.getElementById('sp').style.display=load?'inline-block':'none';
  document.getElementById('st').textContent=msg;
  document.getElementById('sb').className='status'+(err?' error':'');
}

async function px(url,opt={}){
  return fetch(PROXY+'?url='+encodeURIComponent(url),opt);
}

async function tok(){
  const r=await px('https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({app_id:APP_ID,app_secret:APP_SC})
  });
  const d=await r.json();
  if(!d.tenant_access_token)throw new Error('Token lỗi: '+JSON.stringify(d));
  return d.tenant_access_token;
}

async function fetchAll(t){
  const rs=[];let pt=null;
  do{
    let u=`https://open.larksuite.com/open-apis/bitable/v1/apps/${BASE}/tables/${TABLE}/records?page_size=500`;
    if(pt)u+='&page_token='+pt;
    const r=await px(u,{headers:{'Authorization':'Bearer '+t}});
    const d=await r.json();
    if(d.code!==0)throw new Error('API: '+(d.msg||d.code));
    rs.push(...(d.data?.items||[]));
    pt=d.data?.has_more?d.data.page_token:null;
  }while(pt);
  return rs;
}

function parse(item){
  const f=item.fields||{};
  const g=(...ks)=>{for(const k of ks){const v=f[k];if(v!==undefined&&v!==null&&v!=='')return v;}return'';};
  let td=g('Tổ Đội');if(Array.isArray(td))td=td.map(x=>typeof x==='object'?(x.text||x.name||''):x).join(', ');
  let ct=g('Công trình','Công trình (fill)');if(Array.isArray(ct))ct=ct.map(x=>typeof x==='object'?(x.text||x.name||''):x).join(', ');
  const nc=parseFloat(g('Tổng Nhân Sự'))||0;
  const lu=amt(g('Tổng Lương/ Ngày'));
  const dt=pd(g('Ngày Thi Công','Ngày điền form'));
  return{td:td||'—',ct:ct||'—',nc,lu,dt,ds:iso(dt)};
}

async function load(){
  ss('Đang xác thực...',true);
  try{
    const t=await tok();
    ss('Đang tải bản ghi...',true);
    const items=await fetchAll(t);
    recs=items.map(parse).filter(r=>r.lu>0||r.nc>0);
    const now=new Date();
    document.getElementById('uptime').textContent=`Cập nhật: ${now.toLocaleDateString('vi-VN')} ${now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})} · ${items.length} bản ghi`;
    const tds=[...new Set(recs.map(r=>r.td))].sort();
    const cts=[...new Set(recs.map(r=>r.ct))].sort();
    const sTD=document.getElementById('std'),sCT=document.getElementById('sct');
    tds.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sTD.appendChild(o);});
    cts.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sCT.appendChild(o);});
    const dates=recs.map(r=>r.ds).filter(Boolean).sort();
    if(dates.length){document.getElementById('df').value=dates[0];document.getElementById('dt').value=dates[dates.length-1];}
    filter();
  }catch(e){
    console.error(e);ss('Lỗi: '+e.message,false,true);
    document.getElementById('tb').innerHTML=`<tr><td colspan="5" class="state-msg err">❌ ${e.message}</td></tr>`;
  }
}

function filter(){
  const from=document.getElementById('df').value,to=document.getElementById('dt').value;
  const td=document.getElementById('std').value,ct=document.getElementById('sct').value;
  const fil=recs.filter(r=>{
    if(from&&r.ds&&r.ds<from)return false;
    if(to&&r.ds&&r.ds>to)return false;
    if(td&&r.td!==td)return false;
    if(ct&&r.ct!==ct)return false;
    return true;
  });
  const map={};
  fil.forEach(r=>{const k=r.td+'||'+r.ct;if(!map[k])map[k]={td:r.td,ct:r.ct,nc:0,lu:0};map[k].nc+=r.nc;map[k].lu+=r.lu;});
  const rows=Object.values(map).sort((a,b)=>b.lu-a.lu);
  const tL=rows.reduce((s,r)=>s+r.lu,0),tN=fil.reduce((s,r)=>s+r.nc,0);
  const uTD=new Set(rows.map(r=>r.td)).size;
  document.getElementById('mt').textContent=fmt(tL);
  document.getElementById('md').textContent=uTD;
  document.getElementById('mn').textContent=Math.round(tN)+' ngày';
  document.getElementById('mb').textContent=fmt(uTD?tL/uTD:0);
  const fl=from?new Date(from).toLocaleDateString('vi-VN'):'—',tl=to?new Date(to).toLocaleDateString('vi-VN'):'—';
  ss(`Kỳ tính lương: ${fl} → ${tl} · ${fil.length} bản ghi`);
  document.getElementById('tb').innerHTML=rows.length
    ?rows.map(r=>`<tr>
      <td><span class="badge ${bg(r.td)}">${r.td}</span></td>
      <td class="m">${r.ct}</td>
      <td class="r">${Math.round(r.nc)} ngày</td>
      <td class="r amount">${fmt(r.lu)}</td>
      <td class="r m hm">${fmt(r.nc>0?r.lu/r.nc:0)}</td>
    </tr>`).join('')
    :'<tr><td colspan="5" class="state-msg">Không có dữ liệu trong khoảng thời gian này</td></tr>';
  document.getElementById('fn').textContent=Math.round(tN)+' ngày';
  document.getElementById('fl').textContent=fmt(tL);
}

load();
</script>
</body>
</html>
